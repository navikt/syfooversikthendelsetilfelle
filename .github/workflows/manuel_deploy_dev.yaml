name: Manual deploy Dev

on:
  workflow_dispatch:
  push:
    branches:
      - '*'
      - '!master'

env:
  IMAGE: docker.pkg.github.com/${{ github.repository }}/syfooversikthendelsetilfelle:${{ github.sha }}

jobs:
  deploy-dev:
    name: Deploy to NAIS Dev-fss
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: nais/deploy/actions/deploy@v1
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: dev-fss
          RESOURCE: naiserator-dev.yaml
